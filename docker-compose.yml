# Marina — app PHP + MySQL + phpMyAdmin
# Uso: copia .env.example a .env, luego: docker compose up -d --build
# App: http://localhost:8080  |  phpMyAdmin: http://localhost:8081

services:
  db:
    image: mysql:8.0
    container_name: marina-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-marina}
      MYSQL_USER: ${MYSQL_USER:-marina}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-marinapass}
    # 3307 por defecto en el host: en Windows suele estar ocupado el 3306 (XAMPP, MySQL local).
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - marina_db_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  phpmyadmin:
    image: phpmyadmin:5
    container_name: marina-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      UPLOAD_LIMIT: 64M
    ports:
      - "${PMA_PORT:-8081}:80"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marina-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE:-marina}
      DB_USER: ${MYSQL_USER:-marina}
      DB_PASS: ${MYSQL_PASSWORD:-marinapass}
      DB_CHARSET: utf8mb4
      MARINA_URL: ""
    depends_on:
      db:
        condition: service_healthy

volumes:
  marina_db_data:
